name: BankPoint - Firestore to BigQuery Export

on:
  schedule:
    - cron: '0 * * * *'  # Every hour (zero cost - GitHub Actions free tier)
  workflow_dispatch:       # Manual trigger anytime

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-cloud-firestore google-cloud-bigquery

      - - name: Authenticate to GCP
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp_key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_key.json" >> $GITHUB_ENV

      - name: Run Export
        run: python export_to_bq.py

      - name: Done
        run: echo "✅ Firestore → BigQuery export complete!"
